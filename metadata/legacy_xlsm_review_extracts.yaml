        - metadata/mkrf_xlsm_review/ranges/input_variables_area_expr.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_age_expr.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_treatment_eligibility.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_before_curves.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_curves.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_retention.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_unmanaged.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_stratum.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_attributes.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_columns.review.csv
        - metadata/mkrf_xlsm_review/ranges/input_variables_constants.review.csv
    - sheet: Netdown
      path: metadata/mkrf_xlsm_review/netdown.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/netdown_criteria.review.csv
        - metadata/mkrf_xlsm_review/ranges/netdown_names.review.csv
        - metadata/mkrf_xlsm_review/ranges/netdown_factors.review.csv
    - sheet: Curve Library
      path: metadata/mkrf_xlsm_review/curve_library.review.csv
      range_artifacts:
