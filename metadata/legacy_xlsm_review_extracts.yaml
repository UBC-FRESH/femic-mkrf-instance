  current_boundary:
    next_bounded_step: review_remaining_input_variables_semantics
    notes:
      - The review extracts live in the parent FEMIC repo and are referenced here as lineage evidence.
      - The first translated config now lives at config/legacy_xml_builder/input_variables.mkrf.yaml with lineage/status tracked in metadata/legacy_input_variables_translation.yaml.
      - The live exporter seam now covers description/year/horizon plus the legacy block/area/age/exclude expressions, the additional stratification fragment bindings, the treatment-eligibility review flag, and the explicit scalar constants contract.
      - No workbook payload was copied into the instance by this slice.
      - No VBA reimplementation or runnable rebuild claim is made by this slice.
