schema_version: 1

legacy_xlsm_review_extracts:
  case_id: mkrf_legacy_2016
  source_workbook: MKRF_Cosmin_Model/MKRF/04_Models/PW_MKRF/XML/002_base.xlsm
  parent_review_root: metadata/mkrf_xlsm_review
  extract_manifest: metadata/mkrf_xlsm_review/extract_manifest.yaml
  evidence_role:
    - Parent-repo tracked review extracts for the governing workbook-owned values.
    - Review evidence only; not live FEMIC config and not a workbook publication surface.

  extracted_surfaces:
    - sheet: Input Variables
      path: metadata/mkrf_xlsm_review/input_variables.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/input_variables_prob_desc.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_horizon.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_start_year.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_max_age.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_exclude.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_block_key.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_area_expr.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_age_expr.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_treatment_eligibility.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_before_curves.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_curves.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_retention.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_unmanaged.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_stratum.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_after_attributes.review.yaml
        - metadata/mkrf_xlsm_review/ranges/input_variables_columns.review.csv
        - metadata/mkrf_xlsm_review/ranges/input_variables_constants.review.csv
    - sheet: Netdown
      path: metadata/mkrf_xlsm_review/netdown.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/netdown_criteria.review.csv
        - metadata/mkrf_xlsm_review/ranges/netdown_names.review.csv
        - metadata/mkrf_xlsm_review/ranges/netdown_factors.review.csv
    - sheet: Curve Library
      path: metadata/mkrf_xlsm_review/curve_library.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/curve_names.review.csv
    - sheet: Attrib
      path: metadata/mkrf_xlsm_review/attrib.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/attrib_attributes.review.csv
    - sheet: Treat
      path: metadata/mkrf_xlsm_review/treat.review.csv
      range_artifacts:
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_criteria.review.csv
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_succession.review.csv
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_features.review.csv
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_treatments.review.csv
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_factors.review.csv
        - metadata/mkrf_xlsm_review/ranges/treat_stratum_products.review.csv
    - sheet: Lookups
      path: metadata/mkrf_xlsm_review/ranges/lookups_spp_comp.review.csv
      role: supporting_lookup_review_extract
    - sheet: Post Renewal Succession
      path: metadata/mkrf_xlsm_review/ranges/post_renewal_treatment_responses.review.csv
      role: supporting_transition_review_extract

  current_boundary:
    next_bounded_step: plan_post_p55_mkrf_rebuild_gap_closure
    notes:
      - The review extracts live in the parent FEMIC repo and are referenced here as lineage evidence.
      - The first translated config now lives at config/legacy_xml_builder/input_variables.mkrf.yaml with lineage/status tracked in metadata/legacy_input_variables_translation.yaml.
      - The live exporter seam now covers description/year/horizon plus the legacy block/area/age/exclude expressions, the additional stratification fragment bindings, the treatment-eligibility review flag, and the explicit scalar constants contract.
      - The P55.14 Input Variables classification keeps max_inventory_age and blank include hooks as review metadata and blocks beforeCurves until Curve Library translation.
      - The P55.15 Curve Library translation now maps the curveNames range into config/legacy_xml_builder/curve_library.mkrf.yaml and metadata/legacy_curve_library_translation.yaml.
      - The translated curve contract is review-to-build metadata only; no generated XML include hook is active yet.
      - The P55.16 Netdown translation now maps the netdownCriteria, netdownNames, and netdownFactors ranges into config/legacy_xml_builder/netdown.mkrf.yaml and metadata/legacy_netdown_translation.yaml.
      - The translated Netdown contract is review-to-build metadata only; no dumpRetention or proportional area-split behavior is active yet.
      - The P55.17 Attrib translation now maps the attributes range into config/legacy_xml_builder/attributes.mkrf.yaml and metadata/legacy_attributes_translation.yaml.
      - The translated Attrib contract is review-to-build metadata only; no dumpAttributes behavior is active yet.
      - The P55.18 Treat translation now maps the stratumCriteria, stratumSuccession, stratumFeatures, stratumTreatments, stratumFactors, and stratumProducts ranges into config/legacy_xml_builder/strata/treat.mkrf.yaml and metadata/legacy_treat_translation.yaml.
      - The translated Treat contract is review-to-build metadata only; no dumpStratum behavior is active yet.
      - The P55.19 reconciliation now records that the translated contracts are enough for metadata recovery but not enough for a runnable rebuild claim.
      - No workbook payload was copied into the instance by this slice.
      - No VBA reimplementation or runnable rebuild claim is made by this slice.
