schema_version: 1

repository:
  name: "femic-mkrf-instance"
  visibility: "private"
  publication_state: "thin-baseline"
  notes:
    - "Initial MKRF bootstrap publication with no real model payload yet."

artifacts:
  - artifact_id: "mkrf_bootstrap_smoke"
    path: "data/annex_smoke/mkrf_bootstrap_smoke.bin"
    class: "annex_smoke"
    published: true
    notes: "Non-sensitive annex-backed smoke artifact for remote bootstrap validation."
  - artifact_id: "legacy_compiled_package_reference_note"
    path: "runbooks/LEGACY_COMPILED_PACKAGE_REFERENCE.md"
    class: "reference_metadata"
    published: true
    notes: "Instance-local reference note summarizing the stable compiled 2016 PW_MKRF package anatomy."
  - artifact_id: "legacy_compiled_package_reference_yaml"
    path: "metadata/legacy_compiled_package_reference.yaml"
    class: "reference_metadata"
    published: true
    notes: "Machine-readable bagging/tagging map for the stable compiled legacy PW_MKRF package."
  - artifact_id: "legacy_compiled_control_entrypoints"
    path: "data/legacy_mkrf/compiled_controls/entrypoints/"
    class: "archival_reference"
    published: true
    notes: "Copied archival control entrypoints from the legacy PW_MKRF package."
  - artifact_id: "legacy_compiled_control_scripts"
    path: "data/legacy_mkrf/compiled_controls/scripts/"
    class: "archival_reference"
    published: true
    notes: "Copied archival runtime/report helper scripts from the legacy PW_MKRF package."
  - artifact_id: "legacy_compiled_control_targets"
    path: "data/legacy_mkrf/compiled_controls/targets/"
    class: "archival_reference"
    published: true
    notes: "Copied archival target-control scripts from the legacy PW_MKRF package."
  - artifact_id: "legacy_compiled_track_tables"
    path: "data/legacy_mkrf/compiled_tracks/"
    class: "archival_reference"
    published: true
    notes: "Copied archival compiled track-table family from the legacy PW_MKRF package."
  - artifact_id: "legacy_compiled_spatial_runtime"
    path: "data/legacy_mkrf/compiled_spatial/"
    class: "archival_reference"
    published: true
    notes: "Copied archival compiled spatial runtime family from the legacy PW_MKRF package."
  - artifact_id: "legacy_xml_builder_authority_note"
    path: "runbooks/LEGACY_XML_BUILDER_AUTHORITY_REVIEW.md"
    class: "reference_metadata"
    published: true
    notes: "Instance-local authority review for the legacy MKRF workbook-driven XML builder lane."
  - artifact_id: "legacy_xml_builder_authority_yaml"
    path: "metadata/legacy_xml_builder_authority.yaml"
    class: "reference_metadata"
    published: true
    notes: "Machine-readable authority-chain record for the legacy MKRF XML builder surfaces."
  - artifact_id: "legacy_xlsm_surface_map_note"
    path: "runbooks/LEGACY_XLSM_SURFACE_MAP.md"
    class: "reference_metadata"
    published: true
    notes: "Instance-local workbook surface map for the governing MKRF XLSM builder lane."
  - artifact_id: "legacy_xlsm_surface_map_yaml"
    path: "metadata/legacy_xlsm_surface_map.yaml"
    class: "reference_metadata"
    published: true
    notes: "Machine-readable surface-family map for the governing MKRF XLSM builder lane."
  - artifact_id: "legacy_xlsm_review_extracts_yaml"
    path: "metadata/legacy_xlsm_review_extracts.yaml"
    class: "reference_metadata"
    published: true
    notes: "Instance-local pointer to the parent-side tracked workbook review extracts for the governing MKRF XLSM lane."
  - artifact_id: "legacy_input_variables_translation_config"
    path: "config/legacy_xml_builder/input_variables.mkrf.yaml"
    class: "translated_config"
    published: true
    notes: "MKRF-first FEMIC-native translation of the legacy workbook Input Variables surface, including the live block/area/age/exclude export seam, the additional stratification fragment bindings, the treatment-eligibility review flag, the explicit scalar constants contract, and the inactive-field classification for max_inventory_age and include hooks."
  - artifact_id: "legacy_input_variables_translation_yaml"
    path: "metadata/legacy_input_variables_translation.yaml"
    class: "reference_metadata"
    published: true
    notes: "Machine-readable lineage/status map for the MKRF Input Variables translation, including the live block-layout/export contract, the additional stratification fragment bindings, the treatment-eligibility review flag, the explicit scalar constants contract, and the inactive-field classification for max_inventory_age and include hooks."
  - artifact_id: "legacy_input_variables_translation_note"
    path: "runbooks/LEGACY_INPUT_VARIABLES_TRANSLATION.md"
    class: "reference_metadata"
    published: true
    notes: "Instance-local note documenting the live-vs-staged boundary for the first MKRF Input Variables translation, the live block-layout/export contract, the live additional stratification fragment bindings, the treatment-eligibility review flag, the explicit scalar constants contract, and the inactive-field classification for max_inventory_age and include hooks."
  - artifact_id: "legacy_curve_library_translation_config"
    path: "config/legacy_xml_builder/curve_library.mkrf.yaml"
    class: "translated_config"
    published: true
    notes: "MKRF-first FEMIC-native review-to-build contract for the legacy workbook Curve Library surface, preserving curve identifiers, Age-axis coordinates, and nonblank point values while keeping beforeCurves inactive."
  - artifact_id: "legacy_curve_library_translation_yaml"
    path: "metadata/legacy_curve_library_translation.yaml"
    class: "reference_metadata"
    published: true
    notes: "Machine-readable lineage/status map for the MKRF Curve Library translation and its live-vs-deferred generated Curves.xml boundary."
  - artifact_id: "legacy_curve_library_translation_note"
    path: "runbooks/LEGACY_CURVE_LIBRARY_TRANSLATION.md"
    class: "reference_metadata"
    published: true
    notes: "Instance-local note documenting the P55.15 Curve Library review-to-build contract and the deferred beforeCurves activation boundary."
