contract_surface_reconciliation:
  curve_library:
    status: legacy_compiled_curve_evidence_available
    findings:
      - curves.csv preserves compiled numeric curve identifiers and point
        tables, not workbook Curve Library symbolic IDs.
      - The table is compiled matrix evidence for later builder validation, not
        a source table to substitute for the translated Curve Library contract.
  attributes:
    status: compiled_feature_labels_support_attribute_surface
    findings:
      - features.csv carries managed/unmanaged area and yield label families
        that correspond to the translated Attrib review-to-build surface.
      - Full attribute equivalence remains a later builder-validation task
        because this slice does not regenerate XML or matrix outputs.
  treat:
    status: compiled_product_labels_support_treat_surface
    findings:
      - products.csv carries CC and CT treatment product labels that correspond
        to the translated Treat review-to-build surface.
      - The compiled product rows are archival evidence only, not proof of a
        FEMIC-regenerated treatment builder.
  accounts:
    status: compiled_track_evidence_supports_account_surface
    findings:
      - Observed feature/product labels align with account names already
        recorded from accounts.csv and protoaccounts.csv.
      - Existing compiled evidence remains separate from future FEMIC-generated
        tracks produced by XML emission plus Patchworks matrix build.

scope_boundary:
  - No ForestModel XML was generated.
  - No fragments were regenerated.
  - No Patchworks matrix build was run.
  - No compiled track payloads were imported into the instance in this slice.
  - No future FEMIC-regenerated track outputs are claimed.
  - No runnable FEMIC/Patchworks rebuild claim is introduced.

