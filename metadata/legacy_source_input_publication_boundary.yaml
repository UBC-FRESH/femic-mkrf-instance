field_contract:
  base_mkrf_xml_input:
    block: Int(RES_KEY)
    area: area()/10000
    age: Int(AGE_2020)
    exclude: CONTCLAS eq 'X'
  additional_stratification:
    status: CONTCLAS
    au: string(AU_EX)
    auf: string(AU_FU)
    oper: Operabilit
    ct: CT_eligib
    aux: AU_EX
  treatment_eligibility:
    expression: status in unmanaged
    required_bound_field: status

publication_lanes:
  archival_runtime_candidate_lane:
    status: blocked_pending_git_annex_for_fragments
    purpose:
      - Publish legacy compiled fragments/topology as archival runtime evidence
        for future matrix-build comparison.
      - Keep this lane distinct from raw source reconstruction.
  raw_source_reproducibility_lane:
    status: resultant_to_fragments_publication_boundary_reconstructed
    required_families_if_full_reproducibility_is_claimed:
      - MKRF_Cosmin_Model/MKRF/03_MappingAnalysisData/Source.gdb
      - MKRF_Cosmin_Model/MKRF/03_MappingAnalysisData/Resultant.gdb
      - MKRF_Cosmin_Model/MKRF/03_MappingAnalysisData/Resultant_info_v1.xlsx
      - MKRF_Cosmin_Model/MKRF/03_MappingAnalysisData/03_Yields/VDYP/*
    purpose:
      - Reconstruct or audit the origin of fragments/checkpoint inputs from
        upstream mapping and yield-prep data.
    reconstructed_fragments_publication_boundary:
      source_feature_class:
        path: MKRF_Cosmin_Model/MKRF/03_MappingAnalysisData/Resultant.gdb/Resultant
        feature_count: 1873
        geometry_type: MultiPolygon
      runtime_publication:
        target_glob: MKRF_Cosmin_Model/MKRF/04_Models/PW_MKRF/Spatial/fragments.*
        published_feature_count: 1763
        geometry_type: Polygon
        filter:
          expression: CONTCLAS != 'X'
          excluded_feature_count: 110
          excluded_rollup: 2_Non_Forest
          excluded_netdown_counts:
            2_11_Non_Forest: 97
            2_10_Roads: 13
      field_projection:
        - source: Operability
          published: Operabilit
        - source: Shape_Length
          published: Shape_Leng
        - source: Shape_Area
          published: Shape_Area
        - source: CONTCLAS
          published: CONTCLAS
        - source: AGE_2020
          published: AGE_2020
        - source: AU_EX
          published: AU_EX
        - source: AU_FU
          published: AU_FU
        - source: RES_KEY
          published: RES_KEY
        - source: CT_eligib
          published: CT_eligib
      verification:
        shared_res_key_count: 1763
        core_field_mismatches: 0
        true_multipart_shared_features: 0
        note:
          - Resultant rows carried single-part multipolygon geometries only.
          - No value drift was observed across the published runtime field subset.
      interpretation:
        - Runtime `fragments.*` is a narrowed publication of `Resultant`, not a
          separate independently derived geometry family.
        - P58.3a reconstructed the publication contract only; it did not
          re-run the upstream mapping workflow.
  current_femic_run_profile_lane:
    status: template_not_runnable_source_boundary
    run_profile: config/run_profile.mkrf.yaml
    finding:
      - The current run profile selects tsa=mkrf and does not publish a real
        boundary_path or source checkpoint input yet.

explicit_non_requirements_for_next_gate:
  roads:
    status: not_required_for_current_legacy_pin
    rationale:
      - baseMKRF.pin sets useRoutes=false.
      - Road files under ../roads/ are referenced only inside the useRoutes
        branch and are not required before the next readiness gate.
  outputs:
    status: not_required_as_source_input
    rationale:
      - Outputs are validation/report evidence, not source inputs for XML
        emission or matrix build.
  direct_workbook_publication:
    status: not_required_for_current_femic_contract
    rationale:
      - Workbook-owned values are already represented by tracked review
        extracts and translated FEMIC config contracts.
      - Direct workbook publication may still be revisited for provenance, but
        it is not required before designing rebuild-readiness criteria.

identity_boundary:
  generated_xml_literal_description: Base TFL26
  accepted_case_identity: mkrf_legacy_2016
  status: mismatch_recorded_not_accepted_identity
  decision:
    - Preserve `Base TFL26` as a literal legacy artifact value.
    - Do not use `Base TFL26` as the MKRF case identity.
    - Carry the mismatch into rebuild-readiness criteria as a required caveat
      or correction before any user-facing runnable claim.

scope_boundary:
  - No 03_MappingAnalysisData payload was ingested.
  - No Outputs payload was ingested.
  - No roads payload was discovered or ingested.
  - No direct workbook payload was published.
  - No ForestModel XML was generated.
  - No fragments were regenerated.
  - No Patchworks matrix build was run.
  - No runnable FEMIC/Patchworks rebuild claim is introduced.
  - P58.3a reconstructed the raw-to-runtime publication contract without importing raw-source payloads into the instance.

