schema_version: 1

case_id: mkrf_legacy_2016
criteria_id: legacy_rebuild_readiness_milestone_criteria
phase: P56.6
status: readiness_criteria_published

decision:
  metadata_recovery: complete_for_phase_56
  runnable_rebuild_candidate: no_go
  builder_activation: not_started
  matrix_build: not_run
  runnable_rebuild_claim: blocked_until_all_criteria_pass

claim_levels:
  metadata_recovery_complete:
    status: go
    criteria:
      - Legacy workbook-owned Input Variables, Curve Library, Netdown, Attrib,
        and Treat surfaces are translated into FEMIC-ready metadata/config.
      - Existing legacy generated XML, compiled track, and source-input
        evidence boundaries are documented.
      - Remaining runnable-rebuild blockers are explicit and ordered.
  runnable_rebuild_candidate_ready:
    status: no_go
    criteria:
      - FEMIC-native curve, retention/netdown, attribute, and stratum builders
        are implemented and validated in the P56.4 activation order.
      - FEMIC emits a complete MKRF ForestModel XML surface from translated
        contracts without changing default non-MKRF exporter behavior.
      - Required fragments/topology/source inputs are published or otherwise
        materialized under the accepted P56.5 boundary.
      - Patchworks matrix build runs against FEMIC-generated XML plus accepted
        source inputs.
      - FEMIC-generated tracks are directly compared to legacy compiled
        evidence before any runnable claim.
      - The `Base TFL26` literal-description mismatch is corrected or carried
        as an explicit user-facing caveat.

required_go_no_go_gates:
  - gate_id: legacy_evidence_gate
    status: passed_for_metadata_recovery
    required_inputs:
      - metadata/legacy_generated_xml_reconciliation.yaml
      - metadata/legacy_compiled_track_evidence_reconciliation.yaml
      - metadata/legacy_source_input_publication_boundary.yaml
    acceptance:
      - Existing legacy evidence is reviewable and not relabeled as
        FEMIC-regenerated output.
  - gate_id: source_input_publication_gate
    status: not_passed
    blockers:
      - fragments payload publication requires DataLad/git-annex availability.
      - current run_profile.mkrf.yaml is a template and does not publish a real
        boundary_path or source checkpoint.
      - raw source reproducibility through 03_MappingAnalysisData remains
        deferred.
  - gate_id: builder_activation_gate
    status: not_started
    blockers:
      - curve, retention/netdown, attribute, and stratum builders are design
        only.
      - beforeCurves and XML builders remain inactive.
  - gate_id: generated_xml_gate
    status: not_started
    blockers:
      - no FEMIC-generated MKRF ForestModel XML exists yet.
      - no generated XML comparison from FEMIC output to legacy baseMKRF.xml has
        been performed.
  - gate_id: matrix_build_gate
    status: not_started
    blockers:
      - no Patchworks matrix build has been run from FEMIC-generated XML.
      - no FEMIC-generated tracks/features.csv, products.csv, or curves.csv
        outputs exist.
  - gate_id: output_comparison_gate
    status: not_started
    blockers:
      - no FEMIC-generated matrix-build outputs exist for comparison.
      - legacy compiled evidence remains archival comparison evidence only.
  - gate_id: identity_gate
    status: not_passed
    blockers:
      - generated XML literal description is `Base TFL26`, while accepted case
        identity is `mkrf_legacy_2016`.

explicit_scope_boundary:
  - No builder was activated by P56.6.
  - No ForestModel XML was generated by P56.6.
  - No fragments were regenerated by P56.6.
  - No Patchworks matrix build was run by P56.6.
  - No source payloads, roads, outputs, or direct workbook payloads were
    ingested by P56.6.
  - No runnable FEMIC/Patchworks rebuild claim is introduced.

phase_56_closeout:
  status: closed_as_readiness_planning_and_evidence_boundary_phase
  next_recommended_phase:
    focus: implement_first_builder_activation_gate
    starting_boundary:
      - Start with curve emission or another explicitly selected P56.4 gate.
      - Do not run matrix build until source-input publication and XML emission
        gates pass.
