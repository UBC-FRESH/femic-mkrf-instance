remaining_gaps:
  required_before_runnable_rebuild_claim:
    - Materialize pointer-only compiled Tracks/curves.csv, features.csv, and
      products.csv or document why they are intentionally unavailable.
    - Implement and validate FEMIC-native builders for curve, retention,
      attribute, and stratum emission.
    - Reconcile generated ForestModel XML output against the translated
      workbook contracts and compiled track surfaces.
    - Publish real MKRF boundary/checkpoint inputs required by the run profile.
    - Resolve whether 03_MappingAnalysisData, road-network inputs, report
      outputs, or direct workbook publication are required for reproducibility.

go_no_go:
  rebuild_claim: no_go
  metadata_recovery_claim: go
  rationale:
    - Phase 55 recovered the workbook-owned source contract into FEMIC-ready
      metadata surfaces.
    - The current instance is not a runnable legacy Patchworks rebuild because
      generated XML fragments, builder activation, and several compiled matrix
      tables remain unreconciled.
    - Compiled archival outputs are sufficient as review evidence for planning
      the next recovery phase, not as substitute raw/source inputs.

next_bounded_step:
  recommendation: materialize_or_resolve_pointer_only_compiled_track_tables
  roadmap_task: P56.3
  description:
    Resolve the remaining pointer-only compiled track tables before any
    builder activation or runnable rebuild claim.
