  cw_fd_share_percent_ge: 50
  cw_fd_share_source: "base planted managed composition in data/model_input_bundle/managed_au_bootstrap_table.csv"
  audit_artifact: "models/mkrf_patchworks_model/analysis/ct_eligibility_audit.csv"
  eligible_au_ids:
    - cwh_dm_x_cw_dr
    - cwh_dm_x_cw_fdc
    - cwh_dm_x_cw_hw
    - cwh_dm_x_dr_act
    - cwh_dm_x_dr_cw
    - cwh_dm_x_dr_mb
    - cwh_dm_x_fdc_cw
    - cwh_dm_x_fdc_dr
    - cwh_dm_x_fdc_hw
    - cwh_dm_x_fdc_x
    - cwh_dm_x_hw_cw
    - cwh_dm_x_hw_fdc
    - cwh_vm_1_cw_fdc
    - cwh_vm_1_cw_hw
    - cwh_vm_1_dr_hw
    - cwh_vm_1_fdc_cw
    - cwh_vm_1_fdc_hw
    - cwh_vm_1_fdc_x
    - cwh_vm_1_hw_cw
    - cwh_vm_1_hw_fdc
    - cwh_vm_2_cw_fdc
    - cwh_vm_2_cw_hw
    - cwh_vm_2_fdc_cw
    - cwh_vm_2_fdc_hw
    - cwh_vm_2_hw_cw
    - cwh_vm_2_hw_fdc
  notes:
    - "Species threshold is inclusive: exactly 50% Cw+Fd is eligible."
    - "Pure Fd and Fd-leading plantations are eligible when they pass the runtime CT/operability seam."
    - "Slope threshold is provisional and currently represented through the published runtime CT/operability seam."

operability:
  generator_source: "src/femic/workflows/mkrf.py::_mkrf_ct_bucket_specs"
  age_window:
    min_age: 35
    max_age_exclusive: 50
    inclusive_min: true
    inclusive_max: false
  active_treatments:
    CT35:
      begin_age: 35
      end_age: 39
      thinned_au_prefix: thn035
    CT40:
      begin_age: 40
      end_age: 44
      thinned_au_prefix: thn040
    CT45:
      begin_age: 45
      end_age: 49
      thinned_au_prefix: thn045
  inactive_legacy_treatments:
    - CT50
    - CT60
    - CT70
    - CT80
    - CT90
    - CT100
    - CT110
    - CT120
    - CT130
    - CT140
    - CT150

intensity:
  active_runtime_variant: medium
  variants:
    low:
      basal_area_removal_fraction: 0.35
    medium:
      basal_area_removal_fraction: 0.45
    high:
      basal_area_removal_fraction: 0.55
  species_prescription:
    retain_species:
      - Cw
      - Fd
    remove_species:
      - Hw
      - Fd
    retention_priority: "retain Cw first, then Fd"
    removal_priority: "remove Hw first, then Fd only as needed to meet the active removal target"
    implemented_medium_allocation: "target-bounded Hw-first product allocation: Cw product fraction is 0; Hw receives the CT product volume up to the 45% medium removal target; Fd receives only any target balance not met by Hw"
    provisional_fir_rule: "remove merchantable Fd only if Hw share is below the active removal target or later cash-flow calibration requires it"
    audit_artifacts:
      - "models/mkrf_patchworks_model/analysis/ct_intensity_audit.csv"
      - "models/mkrf_patchworks_model/analysis/ct_intensity_summary.csv"
  residual_state_assumption: "post-CT THN lane preserves cedar and carries a bucket-anchored residual standing curve"
  growth_response_assumption: "CT35 and CT45 reuse adjacent bucket response curves until cedar pole response curves are recalibrated"

planted_hw_ingrowth_overlay:
  issue: 13
  config_surface: "config/tipsy/tsamkrf.yaml"
  enabled: true
  landscape_default_percent: 30
  au_override_surface: "hw_ingrowth_overlay.au_overrides_pct"
  stand_override_surface: "hw_ingrowth_overlay.stand_overrides_pct"
  audit_artifacts:
    - "models/mkrf_patchworks_model/analysis/planted_hw_ingrowth_overlay_audit.csv"
    - "models/mkrf_patchworks_model/analysis/planted_hw_ingrowth_overlay_summary.csv"
  notes:
    - "Applied to managed/planted BTC input rows before species are packed into TIPSY slots."
    - "Each non-Hw species transfers the configured percent of stems to Hw while keeping the total planted density at 1500 sph."
    - "BTC supports five planted species slots; where Hw creates a sixth species, the smallest residual non-Hw share is folded into Hw and recorded in the audit."
    - "Landscape default is driven by Anna Tobiasz's MKRF survey summary: 18 surveys, 2-5 years post-harvest, average Hw composition 30%, median 27.5%, range <5% to 68%."
    - "Jaeck et al. 1984 partial-cutting evidence is supporting context for substantial Hw regeneration, not the direct landscape-default parameter source."

