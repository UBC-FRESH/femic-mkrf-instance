schema_version: 1

case_id: mkrf_legacy_2016
plan_id: legacy_builder_activation_and_matrix_build_handoff_order
phase: P56.4
status: design_only

decision:
  builder_activation: not_started
  matrix_build: not_run
  default_exporter_behavior: unchanged
  mkrf_activation: opt_in_only
  runnable_rebuild_claim: no_go

activation_order:
  - step: 1
    surface: curve_emission
    source_contracts:
      - config/legacy_xml_builder/curve_library.mkrf.yaml
      - data/legacy_mkrf/generated_xml/CSV/CURVE_TABLE.csv
      - metadata/legacy_generated_xml_reconciliation.yaml
    future_output:
      - ForestModel curve elements
      - beforeCurves-compatible generated curve fragment if adopted
    validation_gate:
      - Preserve workbook Curve Library symbolic curves.
      - Reconcile emitted generated curves against CURVE_TABLE.csv and located
        Curves.xml by curve identifier, age, and value.
      - Keep beforeCurves inactive until the emitted curve surface is
        explicitly accepted.
  - step: 2
    surface: retention_netdown_emission
    source_contracts:
      - config/legacy_xml_builder/netdown.mkrf.yaml
    future_output:
      - retention/netdown ForestModel logic
      - retention feature/account rows
    validation_gate:
      - Preserve the two reviewed proportional reassignment rules.
      - Prove required fragment/source fields exist before any proportional
        split or retention emission is enabled.
      - Keep incomplete tail values review-only unless a later task adopts
        them with a named consumer.
  - step: 3
    surface: attribute_emission
    source_contracts:
      - config/legacy_xml_builder/attributes.mkrf.yaml
      - metadata/legacy_compiled_track_evidence_reconciliation.yaml
    future_output:
      - feature/product/account definitions derived from Attrib rows
    validation_gate:
      - Preserve the 16 complete Attrib rows.
      - Keep formula dependencies such as frd, Yield_*, LookupTable,
        treatment, and attribute references blocked until their producers are
        live.
      - Compare emitted feature/product labels to legacy features.csv,
        products.csv, accounts.csv, and protoaccounts.csv evidence.
  - step: 4
    surface: stratum_treat_emission
    source_contracts:
      - config/legacy_xml_builder/strata/treat.mkrf.yaml
      - metadata/legacy_compiled_track_evidence_reconciliation.yaml
    future_output:
      - stratum definitions
      - treatment definitions
      - treatment products
    validation_gate:
      - Preserve default criteria and succession semantics.
      - Preserve CC and CT treatment definitions.
      - Keep feature/product template rows review-only until a named builder
        consumer is defined.
      - Compare emitted treatment/product labels to legacy treatments.csv and
        products.csv evidence.
  - step: 5
    surface: full_forestmodel_xml_emission
    source_contracts:
      - config/legacy_xml_builder/input_variables.mkrf.yaml
      - all prior activated builder surfaces
    future_output:
      - FEMIC-generated ForestModel XML
    validation_gate:
      - Preserve translated Input Variables semantics.
      - Keep default K3Z/TSA29 exporter behavior unchanged.
      - Require MKRF opt-in config before using any legacy builder seam.
      - Compare generated XML structure against baseMKRF.xml at the accepted
        contract level.
  - step: 6
    surface: patchworks_matrix_build_handoff
    source_contracts:
      - FEMIC-generated ForestModel XML
      - validated fragments/topology/source-input publication boundary
    future_output:
      - FEMIC-generated tracks/features.csv
      - FEMIC-generated tracks/products.csv
      - FEMIC-generated tracks/curves.csv
      - related matrix-builder tables
    validation_gate:
      - Run only after source-input publication boundary is resolved.
      - Never treat archival legacy compiled tracks as FEMIC-generated outputs.
      - Compare matrix-build outputs to legacy compiled track evidence before
        any runnable rebuild claim.

legacy_evidence_boundary:
  archival_evidence:
    - data/legacy_mkrf/compiled_controls/
    - data/legacy_mkrf/compiled_spatial/
    - data/legacy_mkrf/compiled_tracks/
    - data/legacy_mkrf/generated_xml/
    - metadata/legacy_compiled_track_evidence_reconciliation.yaml
  future_regenerated_outputs:
    - FEMIC-generated ForestModel XML
    - FEMIC-generated Patchworks matrix-build track tables
  rule:
    - Archival evidence may be used for comparison and acceptance gates.
    - Archival evidence must not be relabeled as FEMIC-regenerated output.
    - Matrix-build success is not sufficient without direct output comparison
      against relevant legacy evidence.

scope_boundary:
  - No builder was activated by P56.4.
  - No ForestModel XML was generated by P56.4.
  - No fragments were regenerated by P56.4.
  - No Patchworks matrix build was run by P56.4.
  - No default exporter behavior changed.
  - No runnable FEMIC/Patchworks rebuild claim is introduced.

next_bounded_step:
  recommendation: publish_rebuild_readiness_milestone_criteria
  roadmap_task: P56.6
