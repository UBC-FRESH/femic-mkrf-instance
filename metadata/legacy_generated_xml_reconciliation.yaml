    into the instance in P56.2 because CSV/CURVE_TABLE.csv is sufficient to
    preserve the generated curve-fragment contract for this bounded slice.
  - beforeCurves remains inactive until a later builder activation task adopts
    a live include/emission contract.
  - P56.2 does not implement FEMIC-native XML emission for curves, retention,
    attributes, strata, or the full ForestModel.
  - P56.3 verified existing legacy compiled curves/features/products track
    evidence and left instance payload publication blocked pending git-annex.
  - P56.2 does not decide the real source-input publication boundary; that
    remains scheduled under P56.5.
  - Direct workbook publication is not required for this generated-artifact
    reconciliation, but remains a P56.5 reproducibility-boundary question.

