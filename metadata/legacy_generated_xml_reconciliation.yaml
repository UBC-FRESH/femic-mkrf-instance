base_mkrf_xml_contract:
  forest_model:
    generated_literal_description: Base TFL26
    horizon_years: 300
    start_year: 2020
    max_inventory_age: 350
    match: multi
  identity_check:
    case_id: mkrf_legacy_2016
    status: legacy_description_mismatch_recorded
    findings:
      - The generated XML literal description is `Base TFL26`.
      - That literal is preserved as source evidence, not accepted as the MKRF
        case identity.
      - The mismatch remains a metadata/reproducibility question for the later
        source-input publication and rebuild-readiness criteria tasks.
  input:
    block: Int(RES_KEY)
    area: area()/10000
    age: Int(AGE_2020)
    exclude: CONTCLAS eq 'X'
  output_tables:
    messages: messages.csv
    blocks: blocks.csv
    features: features.csv
    products: products.csv
    treatments: treatments.csv
    curves: curves.csv
    tracknames: tracknames.csv
  stratification_defines:
    status: CONTCLAS
    au: string(AU_EX)
    auf: string(AU_FU)
    oper: Operabilit
    ct: CT_eligib
    aux: AU_EX
    treatment: null
  constants:
    managed: "'C'"
    unmanaged: "'N'"
    frd: "0.027"
    operable: "'Operable'"
    lowoper: "'Low Operability'"
  include_fragments:
    before_curves_entity: Curves.xml
    before_curves_reference_present: true
  base_curve_ids:
    - one
    - zero
    - age
    - le10
    - lt20
    - gt60
    - lt80
    - gt250

translated_contract_reconciliation:
  input_variables:
    config: config/legacy_xml_builder/input_variables.mkrf.yaml
    status: matched_generated_base_xml
    findings:
      - The translated literal description, start_year, horizon_years, and
        max_inventory_age match the generated ForestModel attributes.
      - The generated literal description `Base TFL26` remains flagged as a
        source-description mismatch, not as the accepted MKRF case identity.
      - block, area, age, and exclude expressions match the generated input
        element.
      - additional stratification source expressions match the generated
        define elements; the live FEMIC fragments export still renames the
        workbook `au` binding to `au_1` to avoid colliding with required `AU`.
      - managed, unmanaged, operable, and lowoper constants match the generated
        define elements.
      - frd is numerically equivalent to the workbook formula value 2.7/100,
        but remains deferred because no live builder consumer has been adopted.
  curve_library:
    config: config/legacy_xml_builder/curve_library.mkrf.yaml
    status: matched_generated_base_xml_builtin_curves
    findings:
      - Generated base XML carries the workbook Curve Library curves `zero`,
        `age`, `le10`, `lt20`, `gt60`, `lt80`, and `gt250` with matching
        point coordinates.
      - Generated base XML also carries built-in curve `one`; that curve is
        generator scaffolding, not part of the workbook Curve Library contract.
      - The generated `beforeCurves` entity points to `Curves.xml`, but the
        include hook remains inactive in FEMIC.

