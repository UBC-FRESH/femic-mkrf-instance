pre_commercial_thinning:
  enabled: false
  state_field: "SILV_STATE"
  from_state: "cc_pl"
  to_state: "cc_pl_pct"
  eligible_au_ids: []
  min_origin: "planted"
  age_by_au: {}
  remove_species:
    - "HW"

commercial_thinning:
  enabled: true
  state_field: "SILV_STATE"
  from_state: "cc_pl"
  to_state: "cc_pl_ct"
  objective: "promote utility pole grade cedar (Cw) outcomes"
  eligibility:
    slope_percent_lt: 50
    cw_fd_share_percent_ge: 50
    source: "models/mkrf_patchworks_model/analysis/ct_eligibility_audit.csv"
    notes:
      - "Slope eligibility is represented by the current runtime CT/operability evidence, which carries the ground-based treatment eligibility seam."
      - "Species eligibility is based on the base planted composition: Cw plus Fd must be greater than or equal to 50%."
      - "Pure Fd and Fd-leading plantations are eligible when they pass the runtime ground/operability seam."
  eligible_au_ids:
    - "cwh_dm_x_cw_dr"
    - "cwh_dm_x_cw_fdc"
    - "cwh_dm_x_cw_hw"
    - "cwh_dm_x_dr_act"
    - "cwh_dm_x_dr_cw"
    - "cwh_dm_x_dr_mb"
    - "cwh_dm_x_fdc_cw"
    - "cwh_dm_x_fdc_dr"
    - "cwh_dm_x_fdc_hw"
    - "cwh_dm_x_fdc_x"
    - "cwh_dm_x_hw_cw"
    - "cwh_dm_x_hw_fdc"
    - "cwh_vm_1_cw_fdc"
    - "cwh_vm_1_cw_hw"
    - "cwh_vm_1_dr_hw"
    - "cwh_vm_1_fdc_cw"
    - "cwh_vm_1_fdc_hw"
    - "cwh_vm_1_fdc_x"
    - "cwh_vm_1_hw_cw"
    - "cwh_vm_1_hw_fdc"
    - "cwh_vm_2_cw_fdc"
    - "cwh_vm_2_cw_hw"
    - "cwh_vm_2_fdc_cw"
    - "cwh_vm_2_fdc_hw"
    - "cwh_vm_2_hw_cw"
    - "cwh_vm_2_hw_fdc"
  min_origin: "planted"
  active_age_buckets:
    CT35:
      begin_age: 35
      end_age: 39
      thinned_au_prefix: "thn035"
    CT40:
      begin_age: 40
      end_age: 44
      thinned_au_prefix: "thn040"
    CT45:
      begin_age: 45
      end_age: 49
      thinned_au_prefix: "thn045"
  age_by_au: {}
  intensity_variants:
    low:
      basal_area_removal_fraction: 0.35
    medium:
      basal_area_removal_fraction: 0.45
    high:
      basal_area_removal_fraction: 0.55
  default_intensity: "medium"
  species_prescription:
    retain_species:
      - "CW"
      - "FD"
    remove_species:
      - "HW"
      - "FD"
    retention_priority: "retain Cw first, then Fd"
    removal_priority: "remove Hw first, then Fd only as needed to meet the active removal target"
    provisional_fir_rule: "remove merchantable Fd only as needed after Hw to meet the active removal target or keep the treatment cash-flow positive; final merch/diameter selection remains a calibration item."
  residual_state_assumption: "post-CT THN lane preserves cedar and carries a bucket-anchored residual standing curve."
  growth_response_assumption: "current runtime reuses adjacent bucket response curves for CT35/CT45 until cedar pole response curves are recalibrated."
  basal_area_removal_fraction: 0.45
  basal_area_to_volume_ratio: 1.0

fertilization:
  enabled: false
  state_field: "SILV_STATE"
  response_years: 10
  growth_speedup_fraction: 0.10
  first_application:
    from_state: "cc_pl_ct"
    to_state: "cc_pl_ct_f1"
    timing_rule: "cai_argmax"
  second_application:
    enabled: true
    from_state: "cc_pl_ct_f1"
    to_state: "cc_pl_ct_f1_f2"
    years_after_previous: 10
  third_application:
    enabled: true
    from_state: "cc_pl_ct_f1_f2"
    to_state: "cc_pl_ct_f1_f2_f3"
    years_after_previous: 10

qmd:
  enabled: false
  source: "synthetic"
  notes: "Replace provisional QMD curves with observed or Nemora-derived curves when available."

retention:
  full_retention_au_ids: []
  full_retention_stratum_codes: []
