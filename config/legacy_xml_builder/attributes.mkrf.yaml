review_only:
  incomplete_template_rows:
    count: 143
    row_offsets:
      - 4
      - 8
      - 10
      - 19
      - 20
      - 22-159
    reason: Rows preserve workbook template/default values but have no
      Attribute Name and therefore are not attribute definitions.

validation_contract:
  required_complete_attribute_row_count: 16
  required_incomplete_template_row_count: 143
  required_attribute_names:
    - "%f.area.%m.total"
    - "%f.yield.%m.total"
    - "%f.yield.%m.merch.total"
    - "%f.yield.%m.indsp.Ba"
    - "%f.yield.%m.indsp.Cw"
    - "%f.yield.%m.indsp.Dec"
    - "%f.yield.%m.indsp.Fd"
    - "%f.yield.%m.indsp.Hw"
    - "%f.yield.%m.indsp.Oth"
    - "%f.yield.%m.indsp.Dr"
    - "%f.yield.%m.indsp.Yc"
    - "%f.area.%m.seral.le10"
  required_checks:
    - Preserve the 16 workbook rows with nonblank Attribute Name values.
    - Preserve the direct le10 seral area candidate without activating it.
    - Keep frd, LookupTable, Yield_*, treatment, and attribute-reference
      formulas as review metadata until their dependencies are translated.
    - Keep rows with blank Attribute Name values as incomplete template rows.
