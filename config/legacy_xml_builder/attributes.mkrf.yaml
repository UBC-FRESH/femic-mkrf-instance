schema_version: 1

case_id: mkrf_legacy_2016
contract_id: legacy_attributes_review_to_build
contract_status: review_to_build_contract

source:
  workbook: MKRF_Cosmin_Model/MKRF/04_Models/PW_MKRF/XML/002_base.xlsm
  sheet: Attrib
  named_range: attributes
  parent_review_extracts:
    sheet_extract: metadata/mkrf_xlsm_review/attrib.review.csv
    range_extract: metadata/mkrf_xlsm_review/ranges/attrib_attributes.review.csv

build_boundary:
  live_exporter_input: false
  dump_attributes_status: blocked_pending_attribute_builder_acceptance
  notes:
    - The workbook Attrib surface is accepted as the governing reviewed
      general-attribute surface for future MKRF ForestModel attribute emission.
    - No Attrib row is live exporter/build behavior in this slice.
    - Formula-like expressions remain declarative review evidence until their
      dependencies are translated and an attribute builder can evaluate or
      serialize them explicitly.

field_map:
  applies_to:
    source: Applies to
    femic_field: applies_to
    status: accepted
  curve_or_expression:
    source: Curve or Expression
    femic_field: curve_or_expression
    status: accepted_as_review_expression
  attribute_name:
    source: Attribute Name
    femic_field: attribute_name
    status: accepted_when_nonblank
  factor:
    source: Factor
    femic_field: factor_expression
    status: accepted_as_review_expression
  future:
    source: Future
    femic_field: future
    status: accepted
  cycle:
    source: Cycle
    femic_field: cycle
    status: accepted
  ignore:
    source: Ignore
    femic_field: ignore
    status: accepted
  output:
    source: Output
    femic_field: output
    status: accepted
  scale:
    source: Scale
    femic_field: scale
    status: accepted
  selection_expression:
    source: trailing criteria column
    femic_field: selection_expression
    status: accepted_when_nonblank

row_summary:
  complete_attribute_rows: 16
  incomplete_template_rows: 143
  rows_with_frd_dependency: 14
  rows_with_yield_curve_dependency: 11
  rows_with_lookup_table_dependency: 8
  rows_with_attribute_reference_dependency: 1
  rows_with_curve_library_dependency: 1

row_families:
  - family_id: area_accounting
    status: review_only_deferred_formula
    row_offsets:
      - 1
      - 2
      - 3
    dependencies:
      - frd
      - au
      - aux
      - treatment
      - dynamic_attribute_name_expression
    reason: Uses deferred formula-like frd and dynamic state/treatment naming.
  - family_id: yield_aggregate
    status: review_only_deferred_formula
    row_offsets:
      - 5
      - 6
      - 7
    dependencies:
      - frd
      - treatment
      - yield_curve_registry
      - dynamic_attribute_name_expression
    reason: Uses curveId Yield_* expressions and deferred frd/treatment logic.
  - family_id: merchantable_yield
    status: review_to_build_candidate_blocked_by_attribute_dependency
    row_offsets:
      - 9
    dependencies:
      - managed
      - operable
      - attribute_reference
    reason: Uses operable(attribute(...)) and depends on prior yield attribute emission.
  - family_id: individual_species_yield
    status: review_only_deferred_lookup_formula
    row_offsets:
      - 11
      - 12
      - 13
      - 14
      - 15
      - 16
      - 17
      - 18
    dependencies:
      - frd
      - treatment
      - yield_curve_registry
      - LookupTable(Lookups!SPP_COMP)
    reason: Uses workbook lookup formulas and Yield_* curve references.
  - family_id: seral_area_le10
    status: review_to_build_candidate
    row_offsets:
      - 21
    dependencies:
      - curve_library.le10
      - status
    reason: Uses the translated Curve Library le10 curve and a direct status selection expression.

