schema_version: 1
case_code: "mkrf"

metadata:
  authority: "mkrf planning guidance from Anna Tobiasz"
  notes:
    - "Use AGE_2020 >= 80 as the fire-origin threshold for the first-growth lane."
    - "Use AGE_2020 < 80 as the logging-origin threshold for the managed/planted lane."
    - "Treat these planting specifications as a first-pass compile surface, not the final silviculture contract."
    - "High-elevation vm2 refinement remains deferred until the AU key carries an elevation discriminator."

origin_rules:
  fire_origin_min_age: 80

managed_defaults:
  density_total: 1500
  regen_delay: 1
  oaf1: 1.0
  oaf2: 0.95
  planted_percent: 100
  baseline_system: "clearcut"
  ct_eligible: true
  ct_target_age: 40
  ct_on_fire_origin: false

families:
  cwh_dm_x:
    bec_zone: "cwh"
    bec_subzone: "dm"
    bec_variant: "x"
    species_mix:
      FD: 45
      CW: 45
      PW: 10
    notes: "dm expert default: FDC 45, CW 45, PW 10 at 1500 sph."
  cwh_vm_1:
    bec_zone: "cwh"
    bec_subzone: "vm"
    bec_variant: "1"
    species_mix:
      FD: 45
      CW: 45
      PW: 10
    notes: "vm1 expert default: FDC 45, CW 45, PW 10 at 1500 sph."
  cwh_vm_2:
    bec_zone: "cwh"
    bec_subzone: "vm"
    bec_variant: "2"
    species_mix:
      CW: 70
      FD: 15
      PW: 5
      BA: 5
      SS: 5
    notes: "vm2 first-pass default: CW 70, FD 15, PW 5, BA 5, SS 5; later high-elevation split may replace FD with YC."
